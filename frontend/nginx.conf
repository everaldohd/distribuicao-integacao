server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip básico para os bundles
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA: qualquer rota do front cai no index.html (roteamento no cliente)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets com hash no nome podem ser cacheados agressivamente
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API: repassa para o backend (mesma origem → cookies/CSRF funcionam sem CORS)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend:8000;
    }
}
