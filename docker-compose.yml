services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Credenciais via ambiente. Em DEV caem no default; em PRODUÇÃO defina
    # POSTGRES_USER/POSTGRES_PASSWORD/POSTGRES_DB (ex.: no .env ou secret manager).
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-escalas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-escalas}
      POSTGRES_DB: ${POSTGRES_DB:-escalas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # 127.0.0.1 = só esta máquina acessa o banco; a rede não alcança.
      # (containers continuam acessando normalmente pela rede interna do Docker)
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-escalas}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      # idem: Redis sem senha nunca deve ficar visível na rede
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-escalas}:${POSTGRES_PASSWORD:-escalas}@db:5432/${POSTGRES_DB:-escalas}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-escalas}:${POSTGRES_PASSWORD:-escalas}@db:5432/${POSTGRES_DB:-escalas}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    # --beat embute o agendador (tarefas periódicas) no mesmo processo do worker.
    # OK para 1 worker; com múltiplos workers, rode um serviço `celery beat` único.
    command: celery -A app.workers.celery_app worker --beat --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api/v1

volumes:
  postgres_data:
