name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    name: Backend (lint + testes)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check app

      - name: Mypy (type check)
        continue-on-error: true  # informativo — adoção gradual; endurecer depois
        run: mypy app

      - name: Pytest (com cobertura)
        run: python -m pytest -q --cov=app --cov-report=term-missing

      - name: Scan de dependências (pip-audit)
        continue-on-error: true  # informativo (não bloqueia o build do protótipo)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  frontend:
    name: Frontend (lint + testes + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Testes (vitest, com cobertura)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Scan de dependências (npm audit)
        continue-on-error: true  # informativo (não bloqueia o build do protótipo)
        run: npm audit --audit-level=high
